app:
  title: "TOMMYVISION"
  fullscreen: false
  width: 640
  height: 480

paths:
  library: "./sample_media/library"

simpsons:
  enabled: true
  path: "./sample_media/library/TV/The Simpsons"

player:
  command: "mpv"
  fullscreen: true
  extra_args:
    - "--fs"
    - "--really-quiet"

startup:
  play_boot_video: false
  boot_video: "./assets/boot/boot.mp4"

audio:
  menu_music_enabled: true
  menu_music_folder: "./assets/menu_music"
  menu_music_volume: 0.35
  shuffle: true

resume:
  enabled: true
  state_file: "./data/playback_state.json"
  minimum_position_seconds: 60
  completion_threshold_percent: 92

ui:
  background_color: "blue"
  text_color: "white"
  safe_margin_x: 48
  safe_margin_y: 36
  font_size_large: 48
  font_size_medium: 38
  font_size_small: 24
  logo_path: "./assets/logo/logo-white.png"
  show_text_title_if_logo_missing: true
